name: CI

on:
  push:
    branches: ["**"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: "true"

      - name: Install dependencies
        run: uv sync

      - name: Install ruff and mypy
        run: uv add ruff mypy

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Ruff linter
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy .

      - name: Unit tests
        run: uv run pytest core/tests/unit -v

      - name: Integration tests
        run: uv run pytest core/tests/integration -v

      - name: BDD tests
        run: uv run pytest core/tests/behaviour -v